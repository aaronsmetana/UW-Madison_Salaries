<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UW–Madison Salaries</title>
    <!--
      SPA fallback for GitHub Pages (which has no server-side rewrite).
      Redirects deep links to index.html, preserving the path in a query that
      the script in index.html decodes back. pathSegmentsToKeep = 1 keeps the
      project base segment (/UW-Madison_Salaries/).
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
